# ============================================================
# Candy — Washing Machine + Tumble Dryer
# Home Assistant Lovelace Dashboard
# ⚠️  ENTITY IDs: zvendeso  <ENTRY_ID>  me entry_id-n tuaj
#     Shko: Settings → Devices & Services → Candy → ⋮ → System Info
#     P.sh. nese entry_id = abc123, atherë:
#     {0}-washing_machine  behët  abc123-washing_machine
# ============================================================
#
# SENSOR ID-t e plota (ndryshoji sipas entry_id tuaj):
#
# --- WASHING MACHINE ---
# sensor.<slug>_machine_status          (Machine status)
# sensor.<slug>_phase                   (Phase / Cycle status)
# sensor.<slug>_time_remaining          (Time remaining)
# sensor.<slug>_program                 (Program)
# sensor.<slug>_temperature             (Temperature)
# sensor.<slug>_spin                    (Spin)
# sensor.<slug>_stain_type              (Stain type / Soil level)
# sensor.<slug>_error                   (Error)
# number.<slug>_temperature             (Temperature writable)
# number.<slug>_spin_speed              (Spin speed writable)
# select.<slug>_program                 (Program select)
# select.<slug>_category                (Category select)
# select.<slug>_soil_level              (Soil level select)
# select.<slug>_steam                   (Steam select)
#
# --- TUMBLE DRYER ---
# sensor.<slug>_machine_status_2        (Machine status)
# sensor.<slug>_phase_2                 (Phase)
# sensor.<slug>_time_remaining_2        (Time remaining)
# sensor.<slug>_drying_level            (Drying level)
# sensor.<slug>_error_2                 (Error)
# number.<slug>_drying_in_time          (Drying time writable)
# select.<slug>_drying_level            (Dry level select)
#
# SHENIM: <slug> zakonisht eshte 'candy' ose IP-ja e pajisjes
# ============================================================

title: Candy Laundry
views:
  - title: Laundry Room
    icon: mdi:hanger
    path: candy-laundry
    badges: []
    cards:

      # ═══════════════════════════════════════
      #  🫧  WASHING MACHINE
      # ═══════════════════════════════════════

      - type: markdown
        content: "## 🫧 Washing Machine"
        card_mod:
          style: |
            ha-card { background: none; box-shadow: none; padding: 0; }

      # Hero statusi
      - type: tile
        entity: sensor.washing_machine_machine_status
        name: Washing Machine
        icon: mdi:washing-machine
        color: blue

      # Koha e mbetur (conditional - vetëm kur jo Ready)
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.washing_machine_machine_status
            state_not: Ready
        card:
          type: tile
          entity: sensor.washing_machine_time_remaining
          name: Koha e mbetur
          icon: mdi:progress-clock
          color: blue

      # Senzorët kryesorë
      - type: entities
        title: 📊 Senzorët
        show_header_toggle: false
        entities:
          - entity: sensor.washing_machine_machine_status
            name: Statusi
            icon: mdi:information
          - entity: sensor.washing_machine_phase
            name: Faza
            icon: mdi:state-machine
          - entity: sensor.washing_machine_time_remaining
            name: Koha mbetur
            icon: mdi:timer-outline
          - entity: sensor.washing_machine_program
            name: Programi
            icon: mdi:play-circle
          - entity: sensor.washing_machine_temperature
            name: Temperatura
            icon: mdi:thermometer
          - entity: sensor.washing_machine_spin
            name: Shpejtësia
            icon: mdi:rotate-right
          - entity: sensor.washing_machine_stain_type
            name: Niveli ndotjes
            icon: mdi:water-opacity
          - entity: sensor.washing_machine_error
            name: Gabim
            icon: mdi:alert-circle

      # Cilesimet e shkrueshme (select + number)
      - type: entities
        title: 🎛️ Cilesimet e programit
        show_header_toggle: false
        entities:
          - entity: select.washing_machine_category
            name: Kategoria
            icon: mdi:shape-outline
          - entity: select.washing_machine_program
            name: Programi
            icon: mdi:washing-machine
          - entity: number.washing_machine_temperature
            name: Temperatura e synuar
            icon: mdi:thermometer-plus
          - entity: number.washing_machine_spin_speed
            name: Shpejtësia e synuar
            icon: mdi:speedometer
          - entity: select.washing_machine_soil_level
            name: Niveli ndotjes
            icon: mdi:water-opacity
          - entity: select.washing_machine_steam
            name: Avulli
            icon: mdi:weather-fog

      # Butonat
      - type: horizontal-stack
        cards:
          - type: button
            name: Fillo
            icon: mdi:play
            icon_height: 40px
            tap_action:
              action: perform-action
              perform_action: candy.washing_machine_start
              target: {}
          - type: button
            name: Ndale
            icon: mdi:stop
            icon_height: 40px
            tap_action:
              action: perform-action
              perform_action: candy.washing_machine_stop
              target: {}
          - type: button
            name: Pauzë
            icon: mdi:pause
            icon_height: 40px
            tap_action:
              action: perform-action
              perform_action: candy.washing_machine_pause
              target: {}
          - type: button
            name: Rifillo
            icon: mdi:play-pause
            icon_height: 40px
            tap_action:
              action: perform-action
              perform_action: candy.washing_machine_resume
              target: {}

      # Alert gabim (conditional)
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.washing_machine_error
            above: 0
        card:
          type: markdown
          content: "## ⚠️ Gabim WM! Kodi: **{{ states('sensor.washing_machine_error') }}**"


      # ─── NDARËS VIZUAL ─────────────────────────────
      - type: markdown
        content: "<hr style='border: none; border-top: 2px solid var(--divider-color); margin: 4px 0;'/>"
        card_mod:
          style: |
            ha-card { background: none; box-shadow: none; padding: 0; }


      # ═══════════════════════════════════════
      #  🌬️  TUMBLE DRYER
      # ═══════════════════════════════════════

      - type: markdown
        content: "## 🌬️ Tumble Dryer"
        card_mod:
          style: |
            ha-card { background: none; box-shadow: none; padding: 0; }

      # Hero statusi TD
      - type: tile
        entity: sensor.tumble_dryer_machine_status
        name: Tumble Dryer
        icon: mdi:tumble-dryer
        color: deep-orange

      # Koha e mbetur TD (conditional)
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.tumble_dryer_machine_status
            state_not: Idle
        card:
          type: tile
          entity: sensor.tumble_dryer_time_remaining
          name: Koha e mbetur
          icon: mdi:progress-clock
          color: deep-orange

      # Senzorët TD
      - type: entities
        title: 📊 Senzorët
        show_header_toggle: false
        entities:
          - entity: sensor.tumble_dryer_machine_status
            name: Statusi
            icon: mdi:information
          - entity: sensor.tumble_dryer_phase
            name: Faza
            icon: mdi:state-machine
          - entity: sensor.tumble_dryer_time_remaining
            name: Koha mbetur
            icon: mdi:timer-outline
          - entity: sensor.tumble_dryer_drying_level
            name: Niveli tharjes
            icon: mdi:hair-dryer
          - entity: sensor.tumble_dryer_error
            name: Gabim
            icon: mdi:alert-circle

      # Cilësimet e shkrueshme TD
      - type: entities
        title: 🎛️ Cilësimet e tharjes
        show_header_toggle: false
        entities:
          - entity: select.tumble_dryer_category
            name: Kategoria
            icon: mdi:shape-outline
          - entity: select.tumble_dryer_program
            name: Programi
            icon: mdi:tumble-dryer
          - entity: select.tumble_dryer_drying_level
            name: Niveli tharjes
            icon: mdi:tumble-dryer-alert
          - entity: number.tumble_dryer_drying_in_time
            name: Koha e tharjes
            icon: mdi:timer-outline

      # Butonat TD
      - type: horizontal-stack
        cards:
          - type: button
            name: Fillo
            icon: mdi:play
            icon_height: 40px
            tap_action:
              action: perform-action
              perform_action: candy.tumble_dryer_start
              target: {}
          - type: button
            name: Ndale
            icon: mdi:stop
            icon_height: 40px
            tap_action:
              action: perform-action
              perform_action: candy.tumble_dryer_stop
              target: {}
          - type: button
            name: Pauzë
            icon: mdi:pause
            icon_height: 40px
            tap_action:
              action: perform-action
              perform_action: candy.tumble_dryer_pause
              target: {}
          - type: button
            name: Rifillo
            icon: mdi:play-pause
            icon_height: 40px
            tap_action:
              action: perform-action
              perform_action: candy.tumble_dryer_resume
              target: {}

      # Alert gabim TD (conditional)
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.tumble_dryer_error
            above: 0
        card:
          type: markdown
          content: "## ⚠️ Gabim TD! Kodi: **{{ states('sensor.tumble_dryer_error') }}**"
