# =================================================================
# Candy Laundry Dashboard — entity ID-t REALE nga sistemi
# Butonat perdorin button.<entity> jo services (me e sigurt)
# Kërkon: Mushroom Cards (HACS)
# =================================================================

title: Candy Laundry
views:
  - title: Laundry Room
    icon: mdi:hanger
    path: candy-laundry
    cards:

      # ═══════════════════════════════════════════════════
      #  🫧  WASHING MACHINE
      # ═══════════════════════════════════════════════════

      - type: markdown
        content: '## 🫧 Washing Machine'

      # Hero — statusi dinamik
      - type: custom:mushroom-template-card
        primary: >
          {% set s = states('sensor.washing_machine_machine_status') %}
          {% if s == 'Running' %}🌀 Duke larë...
          {% elif s == 'Paused' %}⏸️ Ndërprerë
          {% elif s == 'Finished' %}✅ Larja përfundoi!
          {% elif s == 'Delayed start' %}⏰ Start i vonuar
          {% else %}💤 Gati{% endif %}
        secondary: >
          {% set prog = states('sensor.washing_machine_program') %}
          {% set mins = states('sensor.washing_machine_wash_cycle_remaining_time') | int(0) %}
          {% if prog != 'No Program' and prog != 'unknown' %}{{ prog }}
          {% if mins > 0 %} — {{ mins }} min mbetur{% endif %}
          {% else %}Nuk ka program aktiv{% endif %}
        icon: >
          {% set s = states('sensor.washing_machine_machine_status') %}
          {% if s == 'Running' %}mdi:washing-machine
          {% elif s == 'Paused' %}mdi:pause-circle
          {% elif s == 'Finished' %}mdi:check-circle
          {% else %}mdi:washing-machine-off{% endif %}
        icon_color: >
          {% set s = states('sensor.washing_machine_machine_status') %}
          {% if s == 'Running' %}blue
          {% elif s == 'Paused' %}orange
          {% elif s == 'Finished' %}green
          {% else %}grey{% endif %}
        tap_action:
          action: none

      # Koha e mbetur — vetëm kur po laj/pauzë
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.washing_machine_machine_status
            state_not: Ready
        card:
          type: custom:mushroom-template-card
          primary: Koha e mbetur
          secondary: '{{ states(''sensor.washing_machine_wash_cycle_remaining_time'') }} minuta'
          icon: mdi:progress-clock
          icon_color: blue
          badge_icon: >
            {% if states('sensor.washing_machine_machine_status') == 'Paused'
            %}mdi:pause{% else %}mdi:play{% endif %}
          badge_color: >
            {% if states('sensor.washing_machine_machine_status') == 'Paused'
            %}orange{% else %}blue{% endif %}

      # Grid senzorësh
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-tile-card
            entity: sensor.washing_machine_temperature
            name: Temperatura
            icon: mdi:thermometer
            icon_color: red
          - type: custom:mushroom-tile-card
            entity: sensor.washing_machine_spin
            name: Shpejtësia
            icon: mdi:rotate-right
            icon_color: blue
          - type: custom:mushroom-tile-card
            entity: sensor.washing_machine_wash_cycle_status
            name: Faza
            icon: mdi:state-machine
            icon_color: teal
          - type: custom:mushroom-tile-card
            entity: sensor.washing_machine_soil_level
            name: Lloji ndotjes
            icon: mdi:water-opacity
            icon_color: indigo
          - type: custom:mushroom-tile-card
            entity: sensor.washing_machine_error
            name: Gabim
            icon: mdi:alert-circle
            icon_color: grey
          - type: custom:mushroom-tile-card
            entity: sensor.washing_machine_delay_start
            name: Delay Start
            icon: mdi:clock-start
            icon_color: purple

      # Konfigurim / senzorë shtesë
      - type: entities
        title: ⚙️ Konfigurim — Washing Machine
        show_header_toggle: false
        entities:
          - entity: sensor.washing_machine
            name: Statusi i plotë
            icon: mdi:information
          - entity: sensor.washing_machine_program
            name: Programi aktiv
            icon: mdi:play-circle
          - entity: sensor.washing_machine_wash_cycle_remaining_time
            name: Koha mbetur
            icon: mdi:timer-outline
          - entity: sensor.washing_machine_wash_cycle_status
            name: Faza
            icon: mdi:state-machine
          - entity: sensor.washing_machine_spin
            name: Shpejtësia
            icon: mdi:rotate-right
          - entity: sensor.washing_machine_temperature
            name: Temperatura
            icon: mdi:thermometer
          - entity: sensor.washing_machine_soil_level
            name: Ndotja
            icon: mdi:water-opacity
          - entity: sensor.washing_machine_error
            name: Gabim
            icon: mdi:alert-circle

      # Cilësimet e shkrueshme
      - type: entities
        title: 🎛️ Cilësimet e programit
        show_header_toggle: false
        entities:
          - entity: select.washing_machine_category
            name: Kategoria
            icon: mdi:shape-outline
          - entity: select.washing_machine_program
            name: Programi
            icon: mdi:washing-machine
          - entity: number.washing_machine_temperature
            name: Temperatura e synuar
            icon: mdi:thermometer-plus
          - entity: number.washing_machine_spin_speed
            name: Shpejtësia e synuar
            icon: mdi:speedometer
          - entity: select.washing_machine_soil_level
            name: Niveli ndotjes
            icon: mdi:water-opacity
          - entity: select.washing_machine_steam
            name: Avulli
            icon: mdi:weather-fog

      # Butonat kontrolli (button entities — 100% reale)
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Fillo
            icon: mdi:play
            icon_color: green
            tap_action:
              action: toggle
              entity: button.washing_machine_start_washing_machine
          - type: custom:mushroom-template-card
            primary: Ndale
            icon: mdi:stop
            icon_color: red
            tap_action:
              action: toggle
              entity: button.washing_machine_stop_washing_machine
          - type: custom:mushroom-template-card
            primary: Pauzë
            icon: mdi:pause
            icon_color: orange
            tap_action:
              action: toggle
              entity: button.washing_machine_pause_washing_machine
          - type: custom:mushroom-template-card
            primary: Rifillo
            icon: mdi:play-pause
            icon_color: blue
            tap_action:
              action: toggle
              entity: button.washing_machine_resume_washing_machine

      # Alert gabim WM
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.washing_machine_error
            above: 0
        card:
          type: markdown
          content: >-
            ## ⚠️ Gabim! Kodi: **{{ states('sensor.washing_machine_error') }}**


      # ─── NDARËS ──────────────────────────────────────────────
      - type: markdown
        content: >
          <hr style='border:none; border-top:2px solid
          var(--divider-color); margin:8px 0;'/>


      # ═══════════════════════════════════════════════════
      #  🌬️  TUMBLE DRYER
      # ═══════════════════════════════════════════════════

      - type: markdown
        content: '## 🌬️ Tumble Dryer'

      # Hero — statusi dinamik TD
      - type: custom:mushroom-template-card
        primary: >
          {% set s = states('sensor.tumble_dryer_machine_status') %}
          {% if s == 'Running' %}♨️ Duke tharë...
          {% elif s == 'Paused' %}⏸️ Ndërprerë
          {% elif s == 'Finished' %}✅ Tharja përfundoi!
          {% else %}💤 Gati{% endif %}
        secondary: >
          {% set mins = states('sensor.tumble_dryer_time_remaining') | int(0) %}
          {% set phase = states('sensor.tumble_dryer_phase') %}
          {% if mins > 0 %}{{ phase }} — {{ mins }} min mbetur
          {% else %}Nuk ka program aktiv{% endif %}
        icon: >
          {% set s = states('sensor.tumble_dryer_machine_status') %}
          {% if s == 'Running' %}mdi:tumble-dryer
          {% elif s == 'Paused' %}mdi:pause-circle
          {% elif s == 'Finished' %}mdi:check-circle
          {% else %}mdi:tumble-dryer-off{% endif %}
        icon_color: >
          {% set s = states('sensor.tumble_dryer_machine_status') %}
          {% if s == 'Running' %}deep-orange
          {% elif s == 'Paused' %}orange
          {% elif s == 'Finished' %}green
          {% else %}grey{% endif %}
        tap_action:
          action: none

      # Koha e mbetur TD
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.tumble_dryer_machine_status
            state_not: Idle
        card:
          type: custom:mushroom-template-card
          primary: Koha e mbetur
          secondary: '{{ states(''sensor.tumble_dryer_time_remaining'') }} minuta'
          icon: mdi:progress-clock
          icon_color: deep-orange
          badge_icon: >
            {% if states('sensor.tumble_dryer_machine_status') == 'Paused'
            %}mdi:pause{% else %}mdi:play{% endif %}
          badge_color: >
            {% if states('sensor.tumble_dryer_machine_status') == 'Paused'
            %}orange{% else %}deep-orange{% endif %}

      # Grid senzorësh TD
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-tile-card
            entity: sensor.tumble_dryer_phase
            name: Faza
            icon: mdi:state-machine
            icon_color: teal
          - type: custom:mushroom-tile-card
            entity: sensor.tumble_dryer_drying_level
            name: Niveli tharjes
            icon: mdi:hair-dryer
            icon_color: deep-orange
          - type: custom:mushroom-tile-card
            entity: sensor.tumble_dryer_error
            name: Gabim
            icon: mdi:alert-circle
            icon_color: grey
          - type: custom:mushroom-tile-card
            entity: sensor.tumble_dryer_machine_status
            name: Statusi
            icon: mdi:tumble-dryer
            icon_color: deep-orange

      # Konfigurim TD
      - type: entities
        title: ⚙️ Konfigurim — Tumble Dryer
        show_header_toggle: false
        entities:
          - entity: sensor.tumble_dryer_machine_status
            name: Statusi
            icon: mdi:information
          - entity: sensor.tumble_dryer_phase
            name: Faza
            icon: mdi:state-machine
          - entity: sensor.tumble_dryer_time_remaining
            name: Koha mbetur
            icon: mdi:timer-outline
          - entity: sensor.tumble_dryer_drying_level
            name: Niveli tharjes
            icon: mdi:hair-dryer
          - entity: binary_sensor.tumble_dryer_door
            name: Dera
            icon: mdi:door
          - entity: binary_sensor.tumble_dryer_clean_filter
            name: Pastro filtrin
            icon: mdi:air-filter
          - entity: binary_sensor.tumble_dryer_water_tank_full
            name: Rezervuari plot
            icon: mdi:water-well
          - entity: sensor.tumble_dryer_error
            name: Gabim
            icon: mdi:alert-circle

      # Cilësimet e shkrueshme TD
      - type: entities
        title: 🎛️ Cilësimet e tharjes
        show_header_toggle: false
        entities:
          - entity: select.tumble_dryer_01_program
            name: Programi
            icon: mdi:tumble-dryer
          - entity: select.tumble_dryer_category
            name: Kategoria
            icon: mdi:shape-outline
          - entity: select.tumble_dryer_drying_level
            name: Niveli tharjes
            icon: mdi:tumble-dryer-alert
          - entity: number.tumble_dryer_drying_in_time
            name: Koha e tharjes
            icon: mdi:timer-outline

      # Butonat kontrolli TD (button entities — 100% reale)
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Fillo
            icon: mdi:play
            icon_color: green
            tap_action:
              action: toggle
              entity: button.tumble_dryer_start_tumble_dryer
          - type: custom:mushroom-template-card
            primary: Ndale
            icon: mdi:stop
            icon_color: red
            tap_action:
              action: toggle
              entity: button.tumble_dryer_stop_tumble_dryer
          - type: custom:mushroom-template-card
            primary: Pauzë
            icon: mdi:pause
            icon_color: orange
            tap_action:
              action: toggle
              entity: button.tumble_dryer_pause_tumble_dryer
          - type: custom:mushroom-template-card
            primary: Rifillo
            icon: mdi:play-pause
            icon_color: deep-orange
            tap_action:
              action: toggle
              entity: button.tumble_dryer_resume_tumble_dryer

      # Alert gabim TD
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.tumble_dryer_error
            above: 0
        card:
          type: markdown
          content: '## ⚠️ Gabim TD! Kodi: **{{ states(''sensor.tumble_dryer_error'') }}**'
